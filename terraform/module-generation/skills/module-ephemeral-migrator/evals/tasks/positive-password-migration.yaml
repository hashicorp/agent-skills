id: positive-password-001
name: Migrate random_password module to write-only
description: >
  User has a Terraform module that generates a random password and stores it in AWS Secrets Manager.
  They want the secret removed from state permanently for every current and future user.
tags:
  - positive-trigger
  - write-only
inputs:
  prompt: |
    our terraform module generates a random_password and writes it to AWS Secrets Manager. we need to permanently remove this secret from state for EVERY user of the module — existing ones too. they can do a manual migration step once, that's fine. module is in fixtures/password-module/. run the full ephemeral migration.
  files:
    - path: password-module/main.tf
    - path: password-module/variables.tf
expected:
  should_trigger: true
graders:
  - type: text
    name: uses-write-only-attribute
    config:
      contains:
        - "_wo"
  - type: text
    name: adds-secret-version-variable
    config:
      contains:
        - "secret_version"
  - type: text
    name: creates-upgrade-guide
    config:
      contains:
        - "UPGRADE-GUIDE"
  - type: text
    name: creates-upgrade-skill
    config:
      contains:
        - "tf-ephemeral-upgrade"
