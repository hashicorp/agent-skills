id: positive-tls-001
name: Migrate tls_private_key module to ephemeral
description: >
  User maintains a Terraform module that generates a TLS private key and stores it in Vault KV.
  They want full state removal for all users — new and existing — with a one-time manual migration step.
tags:
  - positive-trigger
  - ephemeral-creates
inputs:
  prompt: |
    I maintain a Terraform module that creates a TLS private key and stores it in Vault KV v2. I need to fully remove the secret from state for ALL users of this module — both new and existing. Existing users should do a one-time manual step to preserve their key value. No intermediate versions — single breaking change. The module is at fixtures/tls-module/.
  files:
    - path: tls-module/main.tf
    - path: tls-module/variables.tf
expected:
  should_trigger: true
graders:
  - type: text
    name: fetches-ephemerality-list
    config:
      contains:
        - "policy-library-ephemerality"
  - type: text
    name: creates-removed-block
    config:
      contains:
        - "removed"
        - "destroy = false"
  - type: text
    name: creates-ephemeral-resource
    config:
      contains:
        - "ephemeral \"tls_private_key\""
  - type: text
    name: adds-ephemeral-input-variable
    config:
      contains:
        - "ephemeral   = true"
  - type: text
    name: creates-required-docs
    config:
      contains:
        - "UPGRADE-GUIDE"
        - "tf-ephemeral-upgrade"
