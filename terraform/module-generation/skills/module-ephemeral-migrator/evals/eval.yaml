name: module-ephemeral-migrator-eval
description: Tests trigger accuracy and migration output correctness for the module-ephemeral-migrator skill.
skill: module-ephemeral-migrator
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 600
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: trigger_accuracy
    weight: 0.3
    threshold: 1.0
    description: Skill triggers on full-migration prompts and stays quiet on unrelated or partial-migration prompts.
  - name: migration_correctness
    weight: 0.7
    threshold: 0.8
    description: Migration produces correct ephemeral patterns, removed blocks, upgrade guide, and upgrade skill.
graders:
  - type: behavior
    name: token-budget
    config:
      max_tokens: 20000
tasks:
  - "tasks/*.yaml"
